name: Integration Tests

env:
  PNPM_CONFIG_MINIMUM_RELEASE_AGE: ${{ vars.PNPM_CONFIG_MINIMUM_RELEASE_AGE || '0' }}

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test --project=integration
        env:
          MOCK_API_KEY: ${{ secrets.MOCK_API_KEY }}
